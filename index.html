<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VOEX NEWS</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- PAGE LOADER -->
<div class="page-loader">
  <div class="page-loader-inner">VOEX NEWS</div>
</div>

<header class="header">
  <div class="header-inner">
    <a href="index.html" class="logo-link">
      <div class="logo">VOEX NEWS <span>CS2</span></div>
    </a>
    <div class="tabs">
      <button class="tab active" data-tab="news">Новости</button>
      <button class="tab" data-tab="teams">Рейтинг</button>
      <button class="tab" data-tab="matches">Матчи</button>
    </div>
  </div>
</header>

<main class="main">

  <section id="news" class="section active">
    <div class="sec-hdr"><div class="sec-title">Новости</div></div>
    <div id="news-list" class="news-list"></div>
  </section>

  <section id="teams" class="section">
    <div class="sec-hdr"><div class="sec-title">Рейтинг</div></div>
    <div id="teams-list" class="teams-list"></div>
  </section>

  <section id="matches" class="section">
    <div class="sec-hdr"><div class="sec-title">Матчи</div></div>
    <div id="matches-list" class="matches-list"></div>
  </section>

</main>

<footer class="footer">
  <div class="footer-inner">
    <div class="footer-links">
      <a class="footer-link" href="https://t.me/voexnews" target="_blank">Telegram</a>
      <span class="footer-sep">·</span>
      <a class="footer-link" href="https://discord.gg/jpZfktsR" target="_blank">Discord</a>
      <span class="footer-sep">·</span>
      <a class="footer-link" href="about.html">О нас</a>
    </div>
    <div class="footer-copy">© 2026 VOEX NEWS</div>
  </div>
</footer>

<script src="data.js"></script>
<script src="engine.js"></script>
<script>
  // ── Tab switching ──────────────────────────────────────
  document.querySelectorAll(".tab").forEach(tab => {
    tab.addEventListener("click", () => {
      document.querySelector(".tab.active").classList.remove("active");
      tab.classList.add("active");
      const prev = document.querySelector(".section.active");
      const next = document.getElementById(tab.dataset.tab);
      if (prev === next) return;
      prev.classList.remove("active");
      next.classList.add("active");
      sessionStorage.setItem("lastTab", tab.dataset.tab);
    });
  });

  // FIX #2: восстанавливаем нужную вкладку после возврата с team.html
  const lastTab = sessionStorage.getItem("lastTab");
  if (lastTab) {
    sessionStorage.removeItem("lastTab");
    const tTab = document.querySelector(`.tab[data-tab="${lastTab}"]`);
    const tSec = document.getElementById(lastTab);
    if (tTab && tSec) {
      document.querySelector(".tab.active").classList.remove("active");
      document.querySelector(".section.active").classList.remove("active");
      tTab.classList.add("active");
      tSec.classList.add("active");
    }
  }

  // ── News ───────────────────────────────────────────────
  const newsList = document.getElementById("news-list");
  if (DATABASE.news && DATABASE.news.length > 0) {
    newsList.innerHTML = DATABASE.news.map(n => `
      <div class="news-card ${n.featured ? "featured" : ""}">
        <div class="news-card-top">
          <span class="news-cat">${n.cat || "Новость"}</span>
          <span>${n.date || ""}</span>
        </div>
        <div class="news-title">${n.title}</div>
        <p>${n.desc || ""}</p>
      </div>
    `).join("");
  } else {
    newsList.innerHTML = `<div class="news-empty">Новостей пока нет — следите за обновлениями</div>`;
  }

  // ── Teams — автоматический ранг и очки через VOEX.engine ──
  const { finalMap, rankMap, finalSorted } = VOEX.buildRankings();

  // Хелпер: SVG-placeholder для лого
  const logoPlaceholder = `<svg class="team-logo-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="2" y="2" width="20" height="20" rx="4" stroke="currentColor" stroke-width="1.5" stroke-dasharray="3 2"/>
    <path d="M9 15l3-7 3 7M10.5 13h3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
  </svg>`;

  // Хелпер: лого команды по id (папка logo/)
  function getLogoHtml(team, cls, size) {
    const logoSrc = `logo/${team.id}.jpg`;
    return `<div class="${cls}">
      <img src="${logoSrc}" alt="${team.name}"
           onerror="this.parentElement.innerHTML='${logoPlaceholder.replace(/"/g, '&quot;')}'">
    </div>`;
  }

  document.getElementById("teams-list").innerHTML = finalSorted.map((t, i) => {
    const rank = rankMap.get(t.name) ?? (i + 1);
    const pts  = finalMap.get(t.name) ?? 0;
    return `
    <a href="team.html?team=${encodeURIComponent(t.id)}" class="team-card"
       onclick="sessionStorage.setItem('lastTab','teams')">
      <div class="team-rank">${rank}</div>
      ${getLogoHtml(t, "team-logo")}
      <div class="team-info">
        <div class="team-name">${t.name}</div>
        <div class="team-meta">${t.meta}</div>
      </div>
      <div class="team-points">${pts} pts</div>
    </a>`;
  }).join("");

  // ── Matches ────────────────────────────────────────────
  // team1: [лого][ник]  score  [ник][лого] :team2
  function teamMatchBlock(name, isRight, tab) {
    const t = (DATABASE.teams || []).find(t => t.name === name);
    const logoSrc = t ? `logo/${t.id}.jpg` : null;

    const logoHtml = `<div class="match-team-logo">${
      logoSrc
        ? `<img src="${logoSrc}" alt="${name}" onerror="this.style.display='none'">`
        : `<svg class="match-team-logo-svg" viewBox="0 0 24 24" fill="none"><rect x="2" y="2" width="20" height="20" rx="4" stroke="currentColor" stroke-width="1.5" stroke-dasharray="3 2"/><path d="M9 15l3-7 3 7M10.5 13h3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>`
    }</div>`;

    const nameHtml = t
      ? `<a href="team.html?team=${encodeURIComponent(t.id)}" class="match-team-link" onclick="sessionStorage.setItem('lastTab','${tab}')">${name}</a>`
      : `<span class="match-team-plain">${name || "—"}</span>`;

    // CSS flex-direction: row-reverse на .match-team.r даёт порядок: ник → лого
    return `<div class="match-team${isRight ? " r" : ""}">${logoHtml}${nameHtml}</div>`;
  }
  const matchesList = document.getElementById("matches-list");
  if (DATABASE.matches && DATABASE.matches.length > 0) {
    matchesList.innerHTML = DATABASE.matches.map(m => `
      <div class="match-card">
        <div class="match-top">
          <span>${m.date || ""}</span>
          <span>${m.format || ""}</span>
        </div>
        <div class="match-body">
          ${teamMatchBlock(m.team1 || "", false, "matches")}
          <div class="match-score">${m.score || "— : —"}</div>
          ${teamMatchBlock(m.team2 || "", true, "matches")}
        </div>
        <div class="match-maps">
          ${(m.maps || []).filter(mp => mp && mp.trim()).map(mp => `<span class="match-map-item">${mp}</span>`).join("")}
        </div>
      </div>
    `).join("");
  } else {
    matchesList.innerHTML = `<div class="news-empty">Матчей пока нет</div>`;
  }
</script>

</body>
</html>
