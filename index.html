<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VOEX NEWS — CS2</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a href="index.html" class="logo-link">
      <div class="logo">VOEX NEWS <span>CS2</span></div>
    </a>
    <div class="tabs">
      <button class="tab active" data-tab="news">Новости</button>
      <button class="tab" data-tab="teams">Команды</button>
      <button class="tab" data-tab="matches">Матчи</button>
    </div>
  </div>
</header>

<main class="main">

  <section id="news" class="section active">
    <div class="sec-hdr"><div class="sec-title">Новости</div></div>
    <div id="news-list" class="news-list"></div>
  </section>

  <section id="teams" class="section">
    <div class="sec-hdr"><div class="sec-title">Команды</div></div>
    <div id="teams-list" class="teams-list"></div>
  </section>

  <section id="matches" class="section">
    <div class="sec-hdr"><div class="sec-title">Матчи</div></div>
    <div id="matches-list" class="matches-list"></div>
  </section>

</main>

<footer class="footer">
  <div class="footer-inner">
    <div class="footer-links">
      <a class="footer-link" href="https://t.me/voexnews" target="_blank">Telegram</a>
      <span class="footer-sep">·</span>
      <a class="footer-link" href="https://discord.gg/jpZfktsR" target="_blank">Discord</a>
      <span class="footer-sep">·</span>
      <a class="footer-link" href="about.html">О нас</a>
    </div>
    <div class="footer-copy">© 2025 VOEX NEWS</div>
  </div>
</footer>

<script src="data.js"></script>
<script>
  // Tab switching
  document.querySelectorAll(".tab").forEach(tab => {
    tab.addEventListener("click", () => {
      document.querySelector(".tab.active").classList.remove("active");
      tab.classList.add("active");
      const prev = document.querySelector(".section.active");
      const next = document.getElementById(tab.dataset.tab);
      if (prev === next) return;
      prev.classList.remove("active");
      next.classList.add("active");
      sessionStorage.setItem("lastTab", tab.dataset.tab);
    });
  });

  // Восстанавливаем вкладку после возврата со страницы команды
  const lastTab = sessionStorage.getItem("lastTab");
  if (lastTab) {
    sessionStorage.removeItem("lastTab");
    const targetTab = document.querySelector(`.tab[data-tab="${lastTab}"]`);
    const targetSection = document.getElementById(lastTab);
    if (targetTab && targetSection) {
      document.querySelector(".tab.active").classList.remove("active");
      document.querySelector(".section.active").classList.remove("active");
      targetTab.classList.add("active");
      targetSection.classList.add("active");
    }
  }

  // News
  const newsList = document.getElementById("news-list");
  if (DATABASE.news && DATABASE.news.length > 0) {
    newsList.innerHTML = DATABASE.news.map(n => `
      <div class="news-card ${n.featured ? "featured" : ""}">
        <div class="news-card-top">
          <span class="news-cat">${n.cat || "Новость"}</span>
          <span>${n.date || ""}</span>
        </div>
        <div class="news-title">${n.title}</div>
        <p>${n.desc || ""}</p>
      </div>
    `).join("");
  } else {
    newsList.innerHTML = `<div class="news-empty">Новостей пока нет — следите за обновлениями</div>`;
  }

  // Teams — sorted by rank
  const sorted = [...(DATABASE.teams || [])].sort((a, b) => Number(a.rank) - Number(b.rank));
  document.getElementById("teams-list").innerHTML = sorted.map(t => `
    <a href="team.html?team=${encodeURIComponent(t.id)}" class="team-card" data-rank="${t.rank}"
       onclick="sessionStorage.setItem('lastTab','teams')">
      <div class="team-rank">${t.rank}</div>
      <div class="team-info">
        <div class="team-name">${t.name}</div>
        <div class="team-meta">${t.meta}</div>
      </div>
      <div class="team-points">${t.points ?? 0} pts</div>
    </a>
  `).join("");

  // Matches — NO live badge, team names clickable
  const matchesList = document.getElementById("matches-list");

  // Хелпер: ищет id команды по имени
  function teamLink(name) {
    const t = (DATABASE.teams || []).find(t => t.name === name);
    if (t) {
      return `<a href="team.html?team=${encodeURIComponent(t.id)}"
                 class="match-team-link"
                 onclick="sessionStorage.setItem('lastTab','matches')">${name}</a>`;
    }
    return `<span class="match-team-plain">${name}</span>`;
  }

  if (DATABASE.matches && DATABASE.matches.length > 0) {
    matchesList.innerHTML = DATABASE.matches.map(m => `
      <div class="match-card">
        <div class="match-top">
          <span>${m.date || ""}</span>
          <span>${m.format || ""}</span>
        </div>
        <div class="match-body">
          <div class="match-team">${teamLink(m.team1 || "")}</div>
          <div class="match-score">${m.score || "— : —"}</div>
          <div class="match-team r">${teamLink(m.team2 || "")}</div>
        </div>
        <div class="match-maps">
          ${(m.maps || []).map(mp => `<span class="match-map-item">${mp}</span>`).join("")}
        </div>
      </div>
    `).join("");
  } else {
    matchesList.innerHTML = `<div class="news-empty">Матчей пока нет</div>`;
  }
</script>

</body>
</html>
